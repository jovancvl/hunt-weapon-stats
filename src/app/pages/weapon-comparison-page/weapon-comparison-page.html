<div class="content">
  <div>
    <hunt-weapon-info-card [(weapon)]="leftWeapon" titleSize="small"></hunt-weapon-info-card>
    <hunt-weapon-info-card [(weapon)]="rightWeapon" titleSize="small" titleColor="goldenrod"></hunt-weapon-info-card>
    <hunt-stat-comparison-table-component [left]="leftWeapon()" [right]="rightWeapon()"></hunt-stat-comparison-table-component>
  </div>

  <div class="chart-and-body-container">
    <hunt-chart-component [ammo]="[leftWeapon().activeAmmo, rightWeapon().activeAmmo]" (rangeSelected)="rangeSelected($event)"></hunt-chart-component>
    <div class="hunter-bodies-container">
      <hunt-hunter-body-component [ammo]="leftWeapon().activeAmmo" [range]="range()"></hunt-hunter-body-component>
      <hunt-hunter-body-component [ammo]="rightWeapon().activeAmmo" [range]="range()" [alternateTextColor]="true"></hunt-hunter-body-component>
    </div>
  </div>
</div>
