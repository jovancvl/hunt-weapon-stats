<h1>
  {{leftWeapon.name}} {{leftWeapon.activeAmmo !== leftWeapon.baseAmmo ? leftWeapon.activeAmmo.info.name : '' }}
  vs 
  {{rightWeapon.name}} {{rightWeapon.activeAmmo !== rightWeapon.baseAmmo ? rightWeapon.activeAmmo.info.name : '' }}
</h1>

<hunt-ammo-selector [(weapon)]="leftWeapon" [canChangeActiveAmmo]="true"></hunt-ammo-selector>
<hunt-ammo-selector [(weapon)]="rightWeapon" [canChangeActiveAmmo]="true"></hunt-ammo-selector>

<div class="wrapper" data-anim="base wrapper">
  <div class="circle" data-anim="base left"></div>
  <div class="circle" data-anim="base right"></div>
</div>
